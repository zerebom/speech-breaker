<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おしゃべり妨害マシン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        round: ['"M PLUS Rounded 1c"', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.9); opacity: 0; }
        }
        .is-active::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 9999px;
            border: 3px solid rgba(244, 63, 94, 0.4);
            animation: pulse-ring 1.6s ease-out infinite;
        }
        @keyframes bounce-bar {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.3); }
        }
        .bar {
            transform-origin: bottom;
            transition: height 0.08s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .bar.active {
            animation: bounce-bar 0.3s ease-in-out;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-track {
            height: 8px;
            border-radius: 9999px;
            background: linear-gradient(90deg, #fde68a, #fbbf24, #f97316);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 9999px;
            background: #fff;
            border: 3px solid #f97316;
            margin-top: -8px;
            box-shadow: 0 2px 8px rgba(249, 115, 22, 0.3);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 3px 12px rgba(249, 115, 22, 0.45);
        }
    </style>
</head>
<body class="min-h-screen bg-amber-50 flex items-center justify-center p-6 font-round">

    <div class="w-full max-w-sm space-y-6">

        <!-- Header -->
        <div class="text-center space-y-1">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-800">
                おしゃべり妨害マシン
            </h1>
            <p class="text-sm font-medium text-orange-500">
                絶対噛んじゃう魔法のアプリ
            </p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl border-2 border-orange-200 shadow-xl shadow-orange-200/40 p-8 space-y-7">

            <!-- Rule (not warning) -->
            <div class="flex items-center gap-3 bg-yellow-50 border-2 border-yellow-300 border-dashed rounded-2xl px-4 py-3">
                <span class="text-2xl shrink-0">🎧</span>
                <p class="text-sm font-medium text-yellow-800 leading-relaxed">
                    ゲームのルール：<span class="font-bold">イヤホンを付けてね！</span>
                </p>
            </div>

            <!-- Visualizer -->
            <div class="flex items-end justify-center gap-[4px] h-16" id="visualizer">
            </div>

            <!-- Toggle Button -->
            <div class="flex flex-col items-center gap-3">
                <button id="toggleBtn"
                    class="relative w-20 h-20 rounded-full flex items-center justify-center
                           bg-orange-500 text-white font-bold
                           shadow-lg shadow-orange-400/30
                           hover:bg-orange-400 hover:-translate-y-1 hover:shadow-xl hover:shadow-orange-400/40
                           active:scale-90 transition-all duration-200">
                    <svg id="iconPlay" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="iconStop" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 24 24">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
                <p id="statusText" class="text-sm font-bold text-slate-400 tracking-wide">
                    話してみる！
                </p>
            </div>

            <!-- Delay Slider -->
            <div class="space-y-3">
                <div class="flex items-baseline justify-between">
                    <span class="text-sm font-bold text-slate-700">おじゃま度</span>
                    <span class="text-sm font-extrabold text-orange-600 tabular-nums">
                        <span id="delayValue">200</span><span class="text-slate-400 font-medium ml-0.5">ms</span>
                    </span>
                </div>
                <input type="range" id="delaySlider" min="50" max="500" step="10" value="200" class="w-full">
                <div class="flex justify-between items-start text-[11px]">
                    <span class="text-slate-400">50 ms</span>
                    <span class="text-orange-500 font-bold text-center leading-tight">
                        ↑ 150-200 ms<br>一番ろれつが回らなくなるゾーン！
                    </span>
                    <span class="text-slate-400">500 ms</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-[11px] text-slate-400">
            オフライン動作 &middot; データ送信なし &middot; みんなで遊ぼう！
        </p>
    </div>

    <script>
        let audioContext, microphone, delayNode, analyser, animationId;
        let isRunning = false;

        const toggleBtn = document.getElementById('toggleBtn');
        const iconPlay = document.getElementById('iconPlay');
        const iconStop = document.getElementById('iconStop');
        const delaySlider = document.getElementById('delaySlider');
        const delayValueEl = document.getElementById('delayValue');
        const statusText = document.getElementById('statusText');
        const visualizerEl = document.getElementById('visualizer');

        // Color palette for bars (rainbow-ish, warm tones)
        const barColors = [
            'bg-red-400', 'bg-orange-400', 'bg-amber-400', 'bg-yellow-400',
            'bg-lime-400', 'bg-emerald-400', 'bg-teal-400', 'bg-cyan-400',
            'bg-sky-400', 'bg-blue-400', 'bg-indigo-400', 'bg-violet-400',
            'bg-purple-400', 'bg-fuchsia-400',
        ];
        const barColorsIdle = 'bg-orange-200';

        const BAR_COUNT = 24;
        const bars = [];
        for (let i = 0; i < BAR_COUNT; i++) {
            const bar = document.createElement('div');
            bar.className = `bar w-[6px] rounded-full ${barColorsIdle}`;
            bar.style.height = '6px';
            visualizerEl.appendChild(bar);
            bars.push(bar);
        }

        delaySlider.addEventListener('input', function () {
            delayValueEl.textContent = this.value;
            if (delayNode) delayNode.delayTime.value = this.value / 1000;
        });

        let frameCount = 0;
        function drawWaveform() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const step = Math.floor(data.length / BAR_COUNT);
            frameCount++;

            for (let i = 0; i < BAR_COUNT; i++) {
                const value = data[i * step] / 255;
                const height = Math.max(6, value * 64);
                bars[i].style.height = height + 'px';

                // Bounce animation on loud bars
                if (value > 0.6 && frameCount % 3 === 0) {
                    bars[i].classList.add('active');
                    setTimeout(() => bars[i].classList.remove('active'), 300);
                }
            }
            animationId = requestAnimationFrame(drawWaveform);
        }

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                microphone = audioContext.createMediaStreamSource(stream);

                delayNode = audioContext.createDelay(1.0);
                delayNode.delayTime.value = delaySlider.value / 1000;

                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;

                microphone.connect(delayNode);
                microphone.connect(analyser);
                delayNode.connect(audioContext.destination);

                isRunning = true;

                iconPlay.classList.add('hidden');
                iconStop.classList.remove('hidden');
                toggleBtn.classList.remove('bg-orange-500', 'shadow-orange-400/30', 'hover:bg-orange-400', 'hover:shadow-orange-400/40');
                toggleBtn.classList.add('bg-rose-500', 'shadow-rose-500/30', 'hover:bg-rose-400', 'hover:shadow-rose-500/40', 'is-active');

                statusText.textContent = '噛まずに話せるかな？';
                statusText.classList.remove('text-slate-400');
                statusText.classList.add('text-rose-500');

                // Rainbow bars when active
                bars.forEach((b, i) => {
                    b.classList.remove(barColorsIdle);
                    b.classList.add(barColors[i % barColors.length]);
                });
                drawWaveform();
            } catch (err) {
                statusText.textContent = 'マイクを許可してね！';
                statusText.classList.remove('text-slate-400');
                statusText.classList.add('text-red-500');
                console.error(err);
            }
        }

        function stop() {
            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext) { audioContext.close(); audioContext = null; }

            isRunning = false;

            iconPlay.classList.remove('hidden');
            iconStop.classList.add('hidden');
            toggleBtn.classList.add('bg-orange-500', 'shadow-orange-400/30', 'hover:bg-orange-400', 'hover:shadow-orange-400/40');
            toggleBtn.classList.remove('bg-rose-500', 'shadow-rose-500/30', 'hover:bg-rose-400', 'hover:shadow-rose-500/40', 'is-active');

            statusText.textContent = '話してみる！';
            statusText.classList.remove('text-rose-500');
            statusText.classList.add('text-slate-400');

            bars.forEach((b, i) => {
                b.classList.remove(barColors[i % barColors.length]);
                b.classList.add(barColorsIdle);
                b.style.height = '6px';
            });
        }

        toggleBtn.addEventListener('click', () => {
            isRunning ? stop() : start();
        });
    </script>
</body>
</html>
